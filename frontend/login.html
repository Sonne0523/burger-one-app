<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burger One — Staff Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #ff4d00;
      --bg: #0f1115;
      --surface: #1a1d23;
      --border: #2d323a;
      --text: #ffffff;
      --text-muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 40px 30px;
      border-radius: 24px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .logo { font-size: 48px; margin-bottom: 10px; }
    h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    p { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
    .input-group { text-align: left; margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
    input {
      width: 100%;
      padding: 14px 16px;
      background: #0f1115;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: white;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s;
    }
    input:focus { border-color: var(--primary); }
    button {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
      margin-top: 10px;
    }
    button:active { transform: scale(0.98); }
    #error-msg { color: #ff3333; font-size: 13px; margin-top: 16px; display: none; }
    .back-link { margin-top: 24px; display: block; font-size: 13px; color: var(--text-muted); text-decoration: none; }
    .back-link:hover { color: white; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">🍔</div>
    <h1>Staff Login</h1>
    <p>Please enter your credentials</p>
    
    <div class="input-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username">
    </div>
    
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password">
    </div>
    
    <button onclick="handleLogin()">Sign In</button>
    <div id="error-msg">Invalid username or password</div>
    
    <a href="/" class="back-link">← Back to Menu</a>
  </div>

  <script>
    function handleLogin() {
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const error = document.getElementById('error-msg');

      if (user === 'Pravin01' && pass === 'PravinBurger1') {
        sessionStorage.setItem('burger_one_auth', 'true');
        window.location.href = '/dashboard';
      } else {
        error.style.display = 'block';
        setTimeout(() => { error.style.display = 'none'; }, 3000);
      }
    }
  </script>
</body>
</html>
