<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Burger One — Staff kitchen & counter dashboard." />
    <title>Burger One — Staff Dashboard</title>
  <script>
    // Authentication Check
    if (sessionStorage.getItem('burger_one_auth') !== 'true') {
      window.location.href = '/login.html';
    }
  </script>
    <link rel="stylesheet" href="./css/dashboard.css" />
  </head>
  <body>

    <!-- ── Top Bar ───────────────────────────────── -->
    <header class="topbar">
      <div class="brand">
        <span>👨‍🍳 Kitchen & Counter</span>
      </div>
      <div class="status" id="connection-status">
        <span class="status-dot online"></span> System Online
      </div>
      <div style="display: flex; gap: 10px;">
        <button class="reset-stats-btn" onclick="resetStats()" style="background-color: #ff4d4f; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Outfit', sans-serif;">🗑️ Reset Stats</button>
        <button class="refresh-btn" onclick="loadOrders()">⟳ Refresh</button>
      </div>
    </header>

    <!-- ── Stats Bar ─────────────────────────────── -->
    <section class="stats-bar" aria-label="Order statistics">
      <div class="stat-card total">
        <div class="label">Total Orders</div>
        <div class="value" id="stat-total">—</div>
      </div>
      <div class="stat-card pending">
        <div class="label">Pending</div>
        <div class="value" id="stat-pending">—</div>
      </div>
      <div class="stat-card paid">
        <div class="label">Paid</div>
        <div class="value" id="stat-paid">—</div>
      </div>
      <div class="stat-card revenue">
        <div class="label">Revenue</div>
        <div class="value" id="stat-revenue">—</div>
      </div>
    </section>

    <!-- ── Orders ────────────────────────────────── -->
    <section>
      <div class="orders-header">
        <h2>Live Orders</h2>
        <div class="filter-tabs" role="tablist">
          <button class="filter-tab active" data-filter="all"     role="tab">All</button>
          <button class="filter-tab"        data-filter="pending" role="tab">Pending</button>
          <button class="filter-tab"        data-filter="paid"    role="tab">Paid</button>
        </div>
      </div>

      <div class="orders-grid" id="orders-grid">
        <!-- Rendered by JS -->
      </div>
    </section>

    <!-- ── Manage Menu ────────────────────────────── -->
    <section class="menu-manager-section">
      <div class="menu-manager-header">
        <h2>📋 Manage Menu</h2>
        <button class="toggle-menu-btn" id="toggle-menu-btn" onclick="toggleMenuManager()">Show Menu Manager</button>
      </div>

      <div class="menu-manager" id="menu-manager" style="display:none">
        <form class="menu-add-form" id="menu-add-form" onsubmit="addMenuItem(event)">
          <input type="text" id="menu-emoji" placeholder="🍔" style="flex: 0 0 50px">
          <input type="text" id="menu-name" placeholder="Item name" required>
          <select id="menu-type" style="padding: 10px; border-radius: 8px; background: var(--surface); color: var(--text); border: 1px solid var(--border); font-family: 'Outfit', sans-serif;">
            <option value="veg">🟢 Veg</option>
            <option value="non-veg">🔴 Non-Veg</option>
          </select>
          <select id="menu-category" style="padding: 10px; border-radius: 8px; background: var(--surface); color: var(--text); border: 1px solid var(--border); font-family: 'Outfit', sans-serif;">
            <option value="Maggi">Maggi</option>
            <option value="Snacks">Snacks</option>
            <option value="Beverages">Beverages</option>
            <option value="Burger Non-Veg">Burger Non-Veg</option>
            <option value="Burger Veg">Burger Veg</option>
            <option value="Wrap Non-Veg">Wrap Non-Veg</option>
            <option value="Wrap Veg">Wrap Veg</option>
            <option value="Hot & Crispy">Hot & Crispy</option>
          </select>
          <input type="number" id="menu-price" placeholder="Price (₹)" step="0.01" required style="flex: 0 0 100px">
          <button type="submit">+ Add Item</button>
        </form>

        <div class="menu-items-list" id="menu-items-list">
          <!-- Rendered by JS -->
        </div>
      </div>
    </section>

    <script src="./js/dashboard.js?v=4"></script>
  </body>
</html>
